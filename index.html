<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NutriLog">
<title>NutriLog</title>
<style>
  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface2: #f2f1ef;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b65;
    --text3: #9e9e97;
    --accent: #2d6a4f;
    --accent-light: #e8f5f0;
    --accent-text: #1b4332;
    --warn: #b5590a;
    --warn-light: #fff3e8;
    --danger: #c0392b;
    --danger-light: #fdecea;
    --info: #1a5fa8;
    --info-light: #e8f0fb;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
    --tab-h: 58px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1e1e1c;
      --surface2: #2a2a27;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
      --text: #f0efe9;
      --text2: #9a9a92;
      --text3: #606058;
      --accent: #52b788;
      --accent-light: #1a2e24;
      --accent-text: #b7e4c7;
      --warn: #f4a261;
      --warn-light: #2e1e0a;
      --danger: #e57373;
      --danger-light: #2e1010;
      --info: #74b3f0;
      --info-light: #0e1e30;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; color: var(--text); }
  body { display: flex; flex-direction: column; max-width: 680px; margin: 0 auto; }

  /* HEADER */
  .header { padding: 16px 16px 8px; background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .header-row { display: flex; align-items: center; gap: 8px; }
  .app-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); flex: 1; }
  .app-title span { color: var(--accent); }

  /* DATE NAV */
  .date-nav { display: flex; align-items: center; gap: 8px; padding: 8px 16px 12px; }
  .date-btn { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text); flex-shrink: 0; }
  .date-btn:active { background: var(--surface2); }
  .date-label { flex: 1; text-align: center; font-size: 15px; font-weight: 600; color: var(--text); }

  /* MACRO SUMMARY */
  .summary { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; padding: 0 16px 12px; }
  .macro-card { background: var(--surface); border-radius: var(--radius-sm); padding: 10px 8px 8px; border: 0.5px solid var(--border); }
  .macro-card .lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .macro-card .val { font-size: 19px; font-weight: 700; line-height: 1; }
  .macro-card .tgt { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .macro-card .bar { height: 3px; border-radius: 2px; background: var(--surface2); margin-top: 6px; overflow: hidden; }
  .macro-card .bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }
  .val-over { color: var(--danger) !important; }

  /* SCROLL CONTENT */
  .scroll-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px); }

  /* LOG SECTION */
  .log-section { margin: 0 16px 12px; }
  .meal-header { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; padding: 4px 0 6px; }
  .food-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .food-item-info { flex: 1; min-width: 0; }
  .food-item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .food-item-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .food-item-cal { font-size: 13px; font-weight: 600; color: var(--warn); white-space: nowrap; }
  .del-btn { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 2px 6px; line-height: 1; }
  .del-btn:active { color: var(--danger); }
  .empty-log { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.6; }
  .day-total { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; margin: 0 16px 16px; font-size: 12px; color: var(--text2); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }

  /* TABS */
  .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 680px; background: var(--surface); border-top: 0.5px solid var(--border); display: flex; height: var(--tab-h); padding-bottom: var(--safe-bottom); z-index: 20; }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; font-weight: 500; padding-top: 8px; }
  .tab-item.active { color: var(--accent); }
  .tab-icon { font-size: 22px; line-height: 1; }

  /* PAGES */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-input { width: 100%; padding: 11px 14px 11px 38px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); font-size: 15px; color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text3); pointer-events: none; }
  .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--surface2); border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; color: var(--text2); display: none; align-items: center; justify-content: center; }
  .results-list { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; max-height: 50vh; overflow-y: auto; }
  .result-item { padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 0.5px solid var(--border); }
  .result-item:last-child { border-bottom: none; }
  .result-item:active { background: var(--surface2); }
  .result-name { font-size: 14px; font-weight: 500; flex: 1; }
  .result-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .result-cal { font-size: 13px; font-weight: 600; color: var(--warn); }
  .tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 4px; vertical-align: middle; }
  .tag-builtin { background: var(--info-light); color: var(--info); }
  .tag-custom { background: var(--accent-light); color: var(--accent-text); }
  .no-results { padding: 24px; text-align: center; color: var(--text3); font-size: 14px; }

  /* ADD FORM */
  .add-form { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 12px; }
  .add-form-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-end; flex-wrap: wrap; }
  .form-field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 100px; }
  .form-field label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-field input, .form-field select { padding: 9px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 14px; outline: none; width: 100%; }
  .form-field input:focus, .form-field select:focus { border-color: var(--accent); }
  .preview-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
  .preview-item { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
  .preview-item .pv { font-size: 18px; font-weight: 700; }
  .preview-item .pl { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .btn { padding: 10px 18px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--accent); color: white; width: 100%; padding: 13px; font-size: 15px; border-radius: var(--radius); }
  .btn-primary:active { opacity: .85; }
  .btn-sm-danger { background: none; border: 0.5px solid var(--border); color: var(--danger); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 12px; cursor: pointer; }

  /* UNIT TOGGLE */
  .unit-tabs { display: flex; background: var(--surface2); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 10px; }
  .unit-tab { flex: 1; text-align: center; padding: 6px 4px; font-size: 12px; font-weight: 500; border-radius: 6px; cursor: pointer; color: var(--text2); }
  .unit-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

  /* SECTION HEADER */
  .section-hd { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin: 0 0 10px; }

  /* CUSTOM FOOD LIST */
  .custom-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .custom-item-info { flex: 1; }
  .custom-item-name { font-size: 14px; font-weight: 500; }
  .custom-item-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* TARGETS */
  .target-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .save-msg { font-size: 13px; color: var(--accent); margin-top: 8px; display: none; }

  /* DIVIDER */
  .divider { height: 0.5px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="app-title">Nutri<span>Log</span></div>
  </div>
</div>

<div class="scroll-content">
  <!-- LOG VIEW -->
  <div id="view-log">
    <div class="date-nav">
      <button class="date-btn" onclick="changeDay(-1)">&#8592;</button>
      <div class="date-label" id="date-label"></div>
      <button class="date-btn" onclick="changeDay(1)">&#8594;</button>
    </div>
    <div class="summary" id="summary"></div>
    <div id="log-body"></div>
  </div>

  <!-- ADD FOOD VIEW -->
  <div id="view-add" class="page">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" id="search-input" type="text" placeholder="Search food…" oninput="handleSearch(this.value)" autocomplete="off" />
      <button class="search-clear" id="search-clear" onclick="clearSearch()">&#10005;</button>
    </div>
    <div id="search-status" style="font-size:12px;color:var(--text2);margin-bottom:8px;min-height:16px"></div>
    <div id="search-results"></div>
    <div id="add-panel" style="display:none">
      <div class="add-form">
        <div class="add-form-title" id="af-name"></div>
        <div class="unit-tabs" id="unit-tabs">
          <div class="unit-tab active" onclick="setUnitMode('grams')">Grams</div>
          <div class="unit-tab" onclick="setUnitMode('pieces')">Pieces</div>
          <div class="unit-tab" onclick="setUnitMode('spoons')">Spoons</div>
        </div>
        <div class="form-row" id="amount-row">
          <div class="form-field" id="field-amount"><label id="amount-label">Amount (g)</label><input type="number" id="af-amount" value="100" min="1" step="1" oninput="updatePreview()"></div>
          <div class="form-field" id="field-unit" style="display:none"><label>Unit</label>
            <select id="af-unit" onchange="updatePreview()">
              <option value="5">Teaspoon (5g)</option>
              <option value="15">Tablespoon (15g)</option>
              <option value="240">Cup (240ml)</option>
              <option value="30">Shot (30ml)</option>
            </select>
          </div>
          <div class="form-field"><label>Meal</label>
            <select id="af-meal">
              <option>Breakfast</option>
              <option>Lunch</option>
              <option selected>Dinner</option>
              <option>Snack</option>
            </select>
          </div>
        </div>
        <div class="preview-row" id="af-preview"></div>
        <button class="btn btn-primary" onclick="addToLog()">Add to log</button>
      </div>
    </div>
  </div>

  <!-- CUSTOM FOODS VIEW -->
  <div id="view-custom" class="page">
    <div class="section-hd">Add custom food</div>
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px">
      <div class="form-row">
        <div class="form-field" style="flex:2"><label>Name</label><input type="text" id="cf-name" placeholder="e.g. Homemade goulash"></div>
        <div class="form-field"><label>Kcal / 100g</label><input type="number" id="cf-cal" placeholder="180"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>Protein (g)</label><input type="number" id="cf-prot" placeholder="12"></div>
        <div class="form-field"><label>Carbs (g)</label><input type="number" id="cf-carb" placeholder="15"></div>
        <div class="form-field"><label>Fat (g)</label><input type="number" id="cf-fat" placeholder="8"></div>
        <div class="form-field"><label>Fiber (g)</label><input type="number" id="cf-fiber" placeholder="2"></div>
      </div>
      <div class="form-row" style="flex-wrap:nowrap">
        <div class="form-field"><label>Piece weight (g, optional)</label><input type="number" id="cf-piece" placeholder="e.g. 120 for one serving"></div>
      </div>
      <button class="btn btn-primary" onclick="saveCustomFood()">Save food</button>
    </div>
    <div class="section-hd">My foods</div>
    <div id="custom-list"></div>
  </div>

  <!-- TARGETS VIEW -->
  <div id="view-targets" class="page">
    <div class="section-hd">Daily targets</div>
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px">
      <div class="target-grid">
        <div class="form-field"><label>Calories (kcal)</label><input type="number" id="t-cal"></div>
        <div class="form-field"><label>Protein (g)</label><input type="number" id="t-prot"></div>
        <div class="form-field"><label>Carbs (g)</label><input type="number" id="t-carb"></div>
        <div class="form-field"><label>Fat (g)</label><input type="number" id="t-fat"></div>
        <div class="form-field"><label>Fiber (g)</label><input type="number" id="t-fiber"></div>
      </div>
      <button class="btn btn-primary" onclick="saveTargets()">Save</button>
      <div class="save-msg" id="save-msg">Saved ✓</div>
    </div>
    <div class="section-hd">Sync between devices</div>
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px">
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6">Export copies all your data (log, custom foods, targets) to clipboard. On the other device, paste it into the Import box and tap Import.</p>
      <button class="btn btn-primary" onclick="exportData()" style="margin-bottom:10px">Export — copy to clipboard</button>
      <div id="export-msg" style="display:none;font-size:13px;color:var(--accent);margin-bottom:12px">Copied to clipboard ✓ — paste it on your other device.</div>
      <div style="height:0.5px;background:var(--border);margin:12px 0"></div>
      <div class="form-field" style="margin-bottom:10px">
        <label>Paste export code here</label>
        <textarea id="import-input" rows="3" style="width:100%;padding:9px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:monospace;resize:vertical;outline:none;margin-top:5px" placeholder="Paste code from other device…"></textarea>
      </div>
      <button class="btn btn-primary" onclick="importData()">Import</button>
      <div id="import-msg" style="display:none;font-size:13px;margin-top:8px"></div>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-item active" id="tab-log" onclick="switchView('log')">
    <span class="tab-icon">📋</span><span>Log</span>
  </button>
  <button class="tab-item" id="tab-add" onclick="switchView('add')">
    <span class="tab-icon">➕</span><span>Add food</span>
  </button>
  <button class="tab-item" id="tab-custom" onclick="switchView('custom')">
    <span class="tab-icon">🥗</span><span>My foods</span>
  </button>
  <button class="tab-item" id="tab-targets" onclick="switchView('targets')">
    <span class="tab-icon">🎯</span><span>Targets</span>
  </button>
</div>

const SPOON_DEFAULTS = { tsp: 5, tbsp: 15, cup: 240, shot: 30 };

const STORAGE_KEYS = { targets:'nl_targets', log:'nl_log', customFoods:'nl_custom' };

function todayISO() { return new Date().toISOString().slice(0,10); }
function fmt(n) { return Math.round(n*10)/10; }
function fmtI(n) { return Math.round(n); }

function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

const state = {
  targets:     lsGet(STORAGE_KEYS.targets, {cal:2200, prot:150, carb:200, fat:80, fiber:30}),
  log:         lsGet(STORAGE_KEYS.log, {}),
  customFoods: lsGet(STORAGE_KEYS.customFoods, []),
  currentDate: todayISO(),
  pendingFood: null,
  unitMode: 'grams'
};

function persist(key) { lsSet(STORAGE_KEYS[key], state[key]); }

// ─── VIEW ROUTING ─────────────────────────────────────────────────────────────
function switchView(v) {
  ['log','add','custom','targets'].forEach(id => {
    const el = document.getElementById('view-'+id);
    el.style.display = id === v ? 'block' : 'none';
    document.getElementById('tab-'+id).classList.toggle('active', id === v);
  });
  if (v==='log') renderLog();
  if (v==='custom') renderCustomList();
  if (v==='targets') loadTargetsForm();
}

// ─── DATE NAV ─────────────────────────────────────────────────────────────────
function changeDay(d) {
  const dt = new Date(state.currentDate); dt.setDate(dt.getDate()+d);
  state.currentDate = dt.toISOString().slice(0,10);
  renderLog();
}
function dayLabel(iso) {
  const today = todayISO();
  const yest = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if (iso===today) return 'Today';
  if (iso===yest) return 'Yesterday';
  return new Date(iso+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}

// ─── LOG RENDER ───────────────────────────────────────────────────────────────
function getTotals(date) {
  return (state.log[date]||[]).reduce((a,e)=>({
    cal:a.cal+e.cal, prot:a.prot+e.prot, carb:a.carb+e.carb, fat:a.fat+e.fat, fiber:a.fiber+e.fiber
  }), {cal:0,prot:0,carb:0,fat:0,fiber:0});
}

function renderSummary(totals) {
  const t = state.targets;
  const ms = [
    {lbl:'Calories', val:fmtI(totals.cal), tgt:t.cal, unit:'kcal', color:'#e4880a'},
    {lbl:'Protein',  val:fmt(totals.prot), tgt:t.prot, unit:'g',    color:'#1a5fa8'},
    {lbl:'Carbs',    val:fmt(totals.carb), tgt:t.carb, unit:'g',    color:'#1d9e75'},
    {lbl:'Fat',      val:fmt(totals.fat),  tgt:t.fat,  unit:'g',    color:'#c0392b'},
  ];
  document.getElementById('summary').innerHTML = ms.map(m=>{
    const pct = m.tgt ? Math.min(100, m.val/m.tgt*100) : 0;
    const over = m.tgt && m.val > m.tgt;
    return `<div class="macro-card">
      <div class="lbl">${m.lbl}</div>
      <div class="val ${over?'val-over':''}">${m.val}</div>
      <div class="tgt">${m.tgt ? '/ '+m.tgt+' '+m.unit : '–'}</div>
      ${m.tgt ? `<div class="bar"><div class="bar-fill" style="width:${pct}%;background:${over?'var(--danger)':m.color}"></div></div>` : ''}
    </div>`;
  }).join('');
}

function renderLog() {
  document.getElementById('date-label').textContent = dayLabel(state.currentDate);
  const totals = getTotals(state.currentDate);
  renderSummary(totals);
  const entries = state.log[state.currentDate] || [];
  const meals = ['Breakfast','Lunch','Dinner','Snack'];
  let html = '';
  meals.forEach(meal => {
    const items = entries.filter(e=>e.meal===meal);
    if (!items.length) return;
    html += `<div class="log-section"><div class="meal-header">${meal}</div>`;
    items.forEach(e => {
      const idx = entries.indexOf(e);
      html += `<div class="food-item">
        <div class="food-item-info">
          <div class="food-item-name">${e.name}</div>
          <div class="food-item-meta">${e.amountLabel} &nbsp;·&nbsp; P ${fmt(e.prot)}g &nbsp;·&nbsp; C ${fmt(e.carb)}g &nbsp;·&nbsp; F ${fmt(e.fat)}g</div>
        </div>
        <div class="food-item-cal">${fmtI(e.cal)} kcal</div>
        <button class="del-btn" onclick="removeEntry('${state.currentDate}',${idx})">×</button>
      </div>`;
    });
    html += '</div>';
  });
  const body = document.getElementById('log-body');
  if (!entries.length) {
    body.innerHTML = `<div class="empty-log">Nothing logged ${dayLabel(state.currentDate).toLowerCase()==='today'?'today':'for '+dayLabel(state.currentDate).toLowerCase()}.<br>Tap <b>Add food</b> to start.</div>`;
  } else {
    html += `<div class="day-total">
      <span>Fiber: ${fmt(totals.fiber)}g</span>
      <span>Total: ${fmtI(totals.cal)} kcal &nbsp;·&nbsp; P ${fmt(totals.prot)}g &nbsp;·&nbsp; C ${fmt(totals.carb)}g &nbsp;·&nbsp; F ${fmt(totals.fat)}g</span>
    </div>`;
    body.innerHTML = html;
  }
}

function removeEntry(date, idx) {
  state.log[date].splice(idx, 1);
  persist('log');
  renderLog();
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function handleSearch(q) {
  const clear = document.getElementById('search-clear');
  clear.style.display = q ? 'flex' : 'none';
  const ql = q.trim().toLowerCase();
  const status = document.getElementById('search-status');
  const results = document.getElementById('search-results');
  document.getElementById('add-panel').style.display = 'none';
  state.pendingFood = null;
  if (!ql) { results.innerHTML = ''; status.textContent = ''; return; }
  const all = [
    ...state.customFoods.filter(f=>f.name.toLowerCase().includes(ql)).map(f=>({...f,_src:'custom'})),
    ...DB.filter(f=>f.name.toLowerCase().includes(ql)).map(f=>({...f,_src:'builtin'}))
  ];
  if (!all.length) {
    results.innerHTML = `<div class="no-results">No results for "${q}".<br>Add it under My foods.</div>`;
    status.textContent = ''; return;
  }
  status.textContent = `${all.length} result${all.length!==1?'s':''}`;
  results.innerHTML = `<div class="results-list">${all.map(f=>`
    <div class="result-item" onclick='pickFood(${JSON.stringify(f).replace(/'/g,"&#39;")})'>
      <div style="flex:1;min-width:0">
        <div class="result-name">${f.name}<span class="tag ${f._src==='custom'?'tag-custom':'tag-builtin'}">${f._src}</span></div>
        <div class="result-meta">per 100g &nbsp;·&nbsp; P ${fmt(f.prot)}g &nbsp;·&nbsp; C ${fmt(f.carb)}g &nbsp;·&nbsp; F ${fmt(f.fat)}g${f.piece?' &nbsp;·&nbsp; 1 pc = '+f.piece+'g':''}</div>
      </div>
      <div class="result-cal">${fmtI(f.cal)}</div>
    </div>`).join('')}</div>`;
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  handleSearch('');
}

// ─── UNIT MODE ────────────────────────────────────────────────────────────────
function setUnitMode(mode) {
  state.unitMode = mode;
  document.querySelectorAll('.unit-tab').forEach((t,i)=>{
    t.classList.toggle('active', ['grams','pieces','spoons'][i]===mode);
  });
  const amountLabel = document.getElementById('amount-label');
  const fieldUnit = document.getElementById('field-unit');
  const amountInput = document.getElementById('af-amount');
  const f = state.pendingFood;
  if (mode==='grams') {
    amountLabel.textContent = 'Amount (g)';
    fieldUnit.style.display = 'none';
    amountInput.value = 100;
    amountInput.step = 1;
  } else if (mode==='pieces') {
    amountLabel.textContent = `Pieces${f&&f.piece?' (1 pc ≈ '+f.piece+'g)':''}`;
    fieldUnit.style.display = 'none';
    amountInput.value = 1;
    amountInput.step = 0.5;
  } else {
    amountLabel.textContent = 'Count';
    fieldUnit.style.display = '';
    amountInput.value = 1;
    amountInput.step = 0.5;
  }
  updatePreview();
}

function getEffectiveGrams() {
  const f = state.pendingFood;
  const count = parseFloat(document.getElementById('af-amount').value)||0;
  if (state.unitMode==='grams') return count;
  if (state.unitMode==='pieces') return count * (f&&f.piece ? f.piece : 100);
  const unitG = parseFloat(document.getElementById('af-unit').value)||15;
  return count * unitG;
}

function getAmountLabel() {
  const count = parseFloat(document.getElementById('af-amount').value)||0;
  if (state.unitMode==='grams') return count+'g';
  if (state.unitMode==='pieces') return count+' pc';
  const sel = document.getElementById('af-unit');
  return count+' '+sel.options[sel.selectedIndex].text.split(' ')[0].toLowerCase();
}

// ─── PICK FOOD ────────────────────────────────────────────────────────────────
function pickFood(food) {
  state.pendingFood = food;
  document.getElementById('add-panel').style.display = 'block';
  document.getElementById('af-name').textContent = food.name;
  const hasPiece = food.piece && food.piece > 0;
  document.querySelectorAll('.unit-tab')[1].style.opacity = hasPiece ? '' : '.35';
  document.querySelectorAll('.unit-tab')[1].style.pointerEvents = hasPiece ? '' : 'none';
  setUnitMode('grams');
  document.getElementById('add-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function updatePreview() {
  if (!state.pendingFood) return;
  const f = state.pendingFood;
  const g = getEffectiveGrams();
  const r = g/100;
  document.getElementById('af-preview').innerHTML = `
    <div class="preview-item"><div class="pv">${fmtI(f.cal*r)}</div><div class="pl">kcal</div></div>
    <div class="preview-item"><div class="pv">${fmt(f.prot*r)}g</div><div class="pl">protein</div></div>
    <div class="preview-item"><div class="pv">${fmt(f.carb*r)}g</div><div class="pl">carbs</div></div>`;
}

// ─── ADD TO LOG ───────────────────────────────────────────────────────────────
function addToLog() {
  const f = state.pendingFood;
  if (!f) return;
  const g = getEffectiveGrams();
  const r = g/100;
  const meal = document.getElementById('af-meal').value;
  if (!state.log[state.currentDate]) state.log[state.currentDate] = [];
  state.log[state.currentDate].push({
    name: f.name, meal, amountLabel: getAmountLabel(),
    cal: f.cal*r, prot: f.prot*r, carb: f.carb*r, fat: f.fat*r, fiber: (f.fiber||0)*r
  });
  persist('log');
  state.pendingFood = null;
  clearSearch();
  document.getElementById('add-panel').style.display = 'none';
  switchView('log');
}

// ─── CUSTOM FOODS ─────────────────────────────────────────────────────────────
function saveCustomFood() {
  const name = document.getElementById('cf-name').value.trim();
  if (!name) return;
  state.customFoods.push({
    name,
    cal:   parseFloat(document.getElementById('cf-cal').value)||0,
    prot:  parseFloat(document.getElementById('cf-prot').value)||0,
    carb:  parseFloat(document.getElementById('cf-carb').value)||0,
    fat:   parseFloat(document.getElementById('cf-fat').value)||0,
    fiber: parseFloat(document.getElementById('cf-fiber').value)||0,
    piece: parseFloat(document.getElementById('cf-piece').value)||null,
  });
  persist('customFoods');
  ['cf-name','cf-cal','cf-prot','cf-carb','cf-fat','cf-fiber','cf-piece'].forEach(id=>document.getElementById(id).value='');
  renderCustomList();
}

function renderCustomList() {
  const list = document.getElementById('custom-list');
  if (!state.customFoods.length) { list.innerHTML = `<div class="empty-log">No custom foods yet.</div>`; return; }
  list.innerHTML = state.customFoods.map((f,i)=>`
    <div class="custom-item">
      <div class="custom-item-info">
        <div class="custom-item-name">${f.name}</div>
        <div class="custom-item-meta">${fmtI(f.cal)} kcal &nbsp;·&nbsp; P ${fmt(f.prot)}g &nbsp;·&nbsp; C ${fmt(f.carb)}g &nbsp;·&nbsp; F ${fmt(f.fat)}g${f.piece?' &nbsp;·&nbsp; 1 pc='+f.piece+'g':''}</div>
      </div>
      <button class="btn-sm-danger" onclick="deleteCustom(${i})">Delete</button>
    </div>`).join('');
}

function deleteCustom(i) { state.customFoods.splice(i,1); persist('customFoods'); renderCustomList(); }

// ─── TARGETS ──────────────────────────────────────────────────────────────────
function loadTargetsForm() {
  ['cal','prot','carb','fat','fiber'].forEach(k=>document.getElementById('t-'+k).value=state.targets[k]);
}
function saveTargets() {
  ['cal','prot','carb','fat','fiber'].forEach(k=>state.targets[k]=parseFloat(document.getElementById('t-'+k).value)||0);
  persist('targets');
  const m = document.getElementById('save-msg'); m.style.display='block';
  setTimeout(()=>m.style.display='none', 2000);
}

// ─── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportData() {
  const payload = JSON.stringify({
    v: 1,
    targets: state.targets,
    log: state.log,
    customFoods: state.customFoods
  });
  const encoded = btoa(unescape(encodeURIComponent(payload)));
  navigator.clipboard.writeText(encoded).then(() => {
    const msg = document.getElementById('export-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 4000);
  }).catch(() => {
    prompt('Copy this code manually:', encoded);
  });
}

function importData() {
  const raw = document.getElementById('import-input').value.trim();
  const msg = document.getElementById('import-msg');
  if (!raw) { msg.style.display='block'; msg.style.color='var(--danger)'; msg.textContent='Please paste an export code first.'; return; }
  try {
    const payload = JSON.parse(decodeURIComponent(escape(atob(raw))));
    if (!payload.v || !payload.targets) throw new Error('invalid');
    state.targets = payload.targets;
    state.log = payload.log || {};
    state.customFoods = payload.customFoods || [];
    persist('targets'); persist('log'); persist('customFoods');
    document.getElementById('import-input').value = '';
    msg.style.display='block'; msg.style.color='var(--accent)';
    msg.textContent = 'Imported successfully ✓ — all data updated.';
    setTimeout(() => msg.style.display='none', 4000);
    loadTargetsForm();
  } catch(e) {
    msg.style.display='block'; msg.style.color='var(--danger)';
    msg.textContent = 'Invalid code — make sure you copied the full export.';
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
['log','add','custom','targets'].forEach(id=>document.getElementById('view-'+id).style.display='none');
loadTargetsForm();
switchView('log');
</script>
