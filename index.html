<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NutriLog Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f2f1ef;
  --border:rgba(0,0,0,.10);--text:#1a1a18;--text2:#6b6b65;
  --accent:#2d6a4f;--danger:#c0392b;--warn:#b5590a;
  --radius:12px;--radius-sm:8px;--tab-h:60px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--surface:#1e1e1c;--surface2:#2a2a27;
  --border:rgba(255,255,255,.10);--text:#f0efe9;--text2:#9a9a92;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;padding-bottom:80px}
.header{padding:20px;font-size:24px;font-weight:700;background:var(--surface);border-bottom:1px solid var(--border)}
.header span{color:var(--accent)}
.section{padding:16px}
/* Weekly Budget Cards */
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.card{background:var(--surface);padding:16px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 2px 5px rgba(0,0,0,0.05)}
.card-label{font-size:11px;text-transform:uppercase;color:var(--text2);margin-bottom:4px;letter-spacing:0.5px}
.card-val{font-size:22px;font-weight:800}
.card-sub{font-size:11px;color:var(--text2);margin-top:4px}
/* Inputs */
.input-group{margin-bottom:15px}
label{display:block;font-size:13px;margin-bottom:5px;font-weight:600}
input,select{width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none}
button{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:white;font-weight:700;cursor:pointer;margin-top:10px}
/* Tabs */
.tab-bar{position:fixed;bottom:0;width:100%;max-width:600px;background:var(--surface);display:flex;height:var(--tab-h);border-top:1px solid var(--border)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;color:var(--text2);cursor:pointer}
.tab.active{color:var(--accent)}
.page{display:none}.page.active{display:block}
.log-item{background:var(--surface);padding:10px;margin-bottom:8px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid var(--accent)}
</style>
</head>
<body>

<div class="header">Nutri<span>Log</span></div>

<div id="view-dash" class="page active">
    <div class="section">
        <div class="budget-grid" id="budget-summary">
            </div>
        
        <div class="card" style="border-top: 4px solid var(--accent);">
            <div class="card-label">Daily Allowance (Remaining Days)</div>
            <div class="card-val" id="val-allowance">0</div>
            <div class="card-sub" id="val-days-left">Calculating...</div>
        </div>
    </div>

    <div class="section">
        <h3>Today's Log</h3>
        <div id="today-list" style="margin-top:10px"></div>
    </div>
</div>

<div id="view-add" class="page">
    <div class="section">
        <div class="card">
            <h3>Add Food</h3>
            <div class="input-group">
                <label>Food Name</label>
                <input type="text" id="add-name" placeholder="e.g. Chicken Breast">
            </div>
            <div class="input-group">
                <label>Calories (kcal)</label>
                <input type="number" id="add-cal" placeholder="0">
            </div>
            <button onclick="saveEntry()">Save to Log</button>
        </div>
    </div>
</div>

<div id="view-settings" class="page">
    <div class="section">
        <div class="card">
            <h3>Daily Target</h3>
            <div class="input-group">
                <label>Calories Goal</label>
                <input type="number" id="setting-target" value="2000" oninput="initApp()">
            </div>
            <p style="font-size:12px; color:var(--text2)">Your weekly budget is automatically calculated as Target x 7 starting every Sunday.</p>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('dash', this)">Dashboard</div>
    <div class="tab" onclick="switchTab('add', this)">Add Food</div>
    <div class="tab" onclick="switchTab('settings', this)">Settings</div>
</div>

<script>
// INITIAL STATE
let state = {
    target: 2000,
    logs: JSON.parse(localStorage.getItem('nutrilog_logs')) || {}
};

function initApp() {
    state.target = parseInt(document.getElementById('setting-target').value) || 2000;
    calculateWeeklyBudget();
    renderTodayLog();
}

function calculateWeeklyBudget() {
    const now = new Date();
    const dayOfWeek = now.getDay(); // Sunday = 0
    const startOfWeek = new Date(now);
    startOfWeek.setDate(now.getDate() - dayOfWeek);
    startOfWeek.setHours(0,0,0,0);

    // 1. Weekly Budget = daily target * 7
    const weeklyBudget = state.target * 7;

    // 2. Sum calories eaten since Sunday
    let eatenSinceSunday = 0;
    for (let i = 0; i <= dayOfWeek; i++) {
        const d = new Date(startOfWeek);
        d.setDate(startOfWeek.getDate() + i);
        const dateKey = d.toISOString().split('T')[0];
        const dayLogs = state.logs[dateKey] || [];
        eatenSinceSunday += dayLogs.reduce((sum, item) => sum + item.cal, 0);
    }

    // 3. Difference
    const remainingWeekly = weeklyBudget - eatenSinceSunday;

    // 4. Divide by remaining days (including today)
    const daysRemaining = 7 - dayOfWeek;
    const dailyAllowance = remainingWeekly / daysRemaining;

    // Update UI
    const container = document.getElementById('budget-summary');
    container.innerHTML = `
        <div class="card">
            <div class="card-label">Weekly Budget</div>
            <div class="card-val">${weeklyBudget}</div>
            <div class="card-sub">Fixed (Target x 7)</div>
        </div>
        <div class="card">
            <div class="card-label">Eaten Since Sun</div>
            <div class="card-val">${eatenSinceSunday}</div>
            <div class="card-sub">Last ${dayOfWeek + 1} days</div>
        </div>
        <div class="card" style="grid-column: span 2">
            <div class="card-label">Remaining Weekly</div>
            <div class="card-val" style="color:${remainingWeekly < 0 ? 'var(--danger)' : 'var(--accent)'}">${Math.round(remainingWeekly)}</div>
            <div class="card-sub">Total kcal left until Sunday reset</div>
        </div>
    `;

    document.getElementById('val-allowance').innerText = Math.round(dailyAllowance) + " kcal";
    document.getElementById('val-days-left').innerText = `Spread across ${daysRemaining} days remaining`;
}

function saveEntry() {
    const name = document.getElementById('add-name').value;
    const cal = parseInt(document.getElementById('add-cal').value);
    if (!name || !cal) return alert("Please enter name and calories");

    const dateKey = new Date().toISOString().split('T')[0];
    if (!state.logs[dateKey]) state.logs[dateKey] = [];
    
    state.logs[dateKey].push({ name, cal, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
    localStorage.setItem('nutrilog_logs', JSON.stringify(state.logs));
    
    // Clear inputs and go to dashboard
    document.getElementById('add-name').value = '';
    document.getElementById('add-cal').value = '';
    switchTab('dash', document.querySelectorAll('.tab')[0]);
    initApp();
}

function renderTodayLog() {
    const dateKey = new Date().toISOString().split('T')[0];
    const todayLogs = state.logs[dateKey] || [];
    const list = document.getElementById('today-list');
    
    if (todayLogs.length === 0) {
        list.innerHTML = `<p style="color:var(--text2); font-size:14px">Nothing logged today yet.</p>`;
        return;
    }

    list.innerHTML = todayLogs.map(item => `
        <div class="log-item">
            <div>
                <strong>${item.name}</strong><br>
                <small style="color:var(--text2)">${item.time}</small>
            </div>
            <div style="font-weight:700">${item.cal} kcal</div>
        </div>
    `).join('');
}

function switchTab(viewId, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('view-' + viewId).classList.add('active');
    el.classList.add('active');
    if(viewId === 'dash') initApp();
}

// Start
initApp();
</script>

</body>
</html>
