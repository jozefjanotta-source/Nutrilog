<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NutriLog">
<title>NutriLog</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" onerror="window.Chart=null"><\/script>
<style>
:root{--bg:#f7f7f5;--surface:#fff;--surface2:#f2f1ef;--border:rgba(0,0,0,.10);--border2:rgba(0,0,0,.18);--text:#1a1a18;--text2:#6b6b65;--text3:#9e9e97;--accent:#2d6a4f;--accent-light:#e8f5f0;--accent-text:#1b4332;--warn:#b5590a;--danger:#c0392b;--info:#1a5fa8;--info-light:#e8f0fb;--radius:12px;--radius-sm:8px;--shadow:0 1px 4px rgba(0,0,0,.07);--tab-h:58px;--safe-bottom:env(safe-area-inset-bottom,0px)}
@media(prefers-color-scheme:dark){:root{--bg:#141412;--surface:#1e1e1c;--surface2:#2a2a27;--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.18);--text:#f0efe9;--text2:#9a9a92;--text3:#606058;--accent:#52b788;--accent-light:#1a2e24;--accent-text:#b7e4c7;--warn:#f4a261;--danger:#e57373;--info:#74b3f0;--info-light:#0e1e30}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;color:var(--text)}
body{display:flex;flex-direction:column;max-width:680px;margin:0 auto}
.header{padding:14px 16px 8px;background:var(--bg);position:sticky;top:0;z-index:10}
.app-title{font-size:22px;font-weight:700;letter-spacing:-.5px}.app-title span{color:var(--accent)}
.scroll-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px)}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:680px;background:var(--surface);border-top:.5px solid var(--border);display:flex;height:var(--tab-h);padding-bottom:var(--safe-bottom);z-index:20}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;font-weight:500;padding-top:8px}
.tab-item.active{color:var(--accent)}.tab-icon{font-size:20px;line-height:1}
.page{display:none;padding:16px}
.date-nav{display:flex;align-items:center;gap:8px;padding:8px 16px 12px}
.date-btn{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text);flex-shrink:0}
.date-btn:active{background:var(--surface2)}
.date-label{flex:1;text-align:center;font-size:15px;font-weight:600}
.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;padding:0 16px 8px}
.macro-card{background:var(--surface);border-radius:var(--radius-sm);padding:10px 8px 8px;border:.5px solid var(--border)}
.macro-card .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.macro-card .val{font-size:19px;font-weight:700;line-height:1}
.macro-card .tgt{font-size:10px;color:var(--text3);margin-top:2px}
.macro-card .bar{height:3px;border-radius:2px;background:var(--surface2);margin-top:6px;overflow:hidden}
.macro-card .bar-fill{height:100%;border-radius:2px;transition:width .3s}
.val-over{color:var(--danger)!important}
.remain-row{display:flex;align-items:center;gap:16px;background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);margin:0 16px 12px;padding:14px 16px}
.ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0}
.ring-wrap canvas{width:72px!important;height:72px!important}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-center .rc-val{font-size:16px;font-weight:700;line-height:1}
.ring-center .rc-lbl{font-size:9px;color:var(--text3);margin-top:1px}
.remain-macros{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rm-item .rm-lbl{font-size:11px;color:var(--text3)}
.rm-item .rm-val{font-size:14px;font-weight:600;margin-top:1px}
.rm-item .rm-val.over{color:var(--danger)}
.meal-bar-row{margin:0 16px 12px}
.meal-bar-item{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.meal-bar-label{font-size:12px;color:var(--text2);width:76px;flex-shrink:0}
.meal-bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.meal-bar-fill{height:100%;border-radius:3px}
.meal-bar-cal{font-size:12px;color:var(--text2);width:48px;text-align:right;flex-shrink:0}
.log-section{margin:0 16px 12px}
.meal-header{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;padding:4px 0 6px}
.food-item{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.food-item-info{flex:1;min-width:0}
.food-item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.food-item-meta{font-size:12px;color:var(--text2);margin-top:2px}
.food-item-cal{font-size:13px;font-weight:600;color:var(--warn);white-space:nowrap}
.del-btn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1}
.del-btn:active{color:var(--danger)}
.empty-log{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.6}
.day-total{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;margin:0 16px 16px;font-size:12px;color:var(--text2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
.search-wrap{position:relative;margin-bottom:12px}
.search-input{width:100%;padding:11px 14px 11px 38px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--surface);font-size:15px;color:var(--text);outline:none}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--surface2);border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;color:var(--text2);display:none;align-items:center;justify-content:center}
.results-list{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);overflow:hidden;max-height:50vh;overflow-y:auto}
.result-item{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:.5px solid var(--border)}
.result-item:last-child{border-bottom:none}
.result-item:active{background:var(--surface2)}
.result-name{font-size:14px;font-weight:500;flex:1}
.result-meta{font-size:12px;color:var(--text2);margin-top:2px}
.result-cal{font-size:13px;font-weight:600;color:var(--warn)}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}
.tag-builtin{background:var(--info-light);color:var(--info)}
.tag-custom{background:var(--accent-light);color:var(--accent-text)}
.no-results{padding:24px;text-align:center;color:var(--text3);font-size:14px}
.add-form{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:12px}
.add-form-title{font-size:15px;font-weight:600;margin-bottom:12px}
.form-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end;flex-wrap:wrap}
.form-field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:100px}
.form-field label{font-size:12px;color:var(--text2);font-weight:500}
.form-field input,.form-field select{padding:9px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;outline:none;width:100%}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.preview-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.preview-item{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center}
.preview-item .pv{font-size:18px;font-weight:700}
.preview-item .pl{font-size:11px;color:var(--text2);margin-top:2px}
.btn-primary{background:var(--accent);color:#fff;width:100%;padding:13px;font-size:15px;border-radius:var(--radius);border:none;font-weight:600;cursor:pointer}
.btn-primary:active{opacity:.85}
.btn-sm-danger{background:none;border:.5px solid var(--border);color:var(--danger);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;cursor:pointer}
.unit-tabs{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:3px;margin-bottom:10px}
.unit-tab{flex:1;text-align:center;padding:6px 4px;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;color:var(--text2)}
.unit-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.section-hd{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:0 0 10px}
.custom-item{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.custom-item-info{flex:1}
.custom-item-name{font-size:14px;font-weight:500}
.custom-item-meta{font-size:12px;color:var(--text2);margin-top:2px}
.target-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.save-msg{font-size:13px;color:var(--accent);margin-top:8px;display:none}
.range-toggle{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:3px;margin-bottom:16px}
.range-btn{flex:1;text-align:center;padding:7px;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;color:var(--text2);border:none;background:none}
.range-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.chart-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px}
.chart-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.chart-wrap{position:relative;height:180px}
.weekly-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.week-stat{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:12px}
.week-stat .ws-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.week-stat .ws-val{font-size:20px;font-weight:700}
.week-stat .ws-sub{font-size:11px;color:var(--text2);margin-top:2px}
.weight-log-row{display:flex;gap:8px;margin-bottom:12px;align-items:flex-end}
.weight-entry{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;font-size:13px}
.weight-entry-date{color:var(--text2)}
.weight-entry-val{font-weight:600}
.micro-item{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.micro-item .mi-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.micro-item .mi-val{font-size:17px;font-weight:700}
.micro-item .mi-tgt{font-size:11px;color:var(--text3);margin-top:2px}
.micro-item .bar{height:4px;border-radius:2px;background:var(--surface2);margin-top:6px;overflow:hidden}
.micro-item .bar-fill{height:100%;border-radius:2px}
</style>
</head>
<body>
<div class="header"><div class="app-title">Nutri<span>Log</span></div></div>
<div class="scroll-content">

<div id="view-log">
  <div class="date-nav">
    <button class="date-btn" onclick="changeDay(-1)">&#8592;</button>
    <div class="date-label" id="date-label"></div>
    <button class="date-btn" onclick="changeDay(1)">&#8594;</button>
  </div>
  <div class="summary" id="summary"></div>
  <div class="remain-row">
    <div class="ring-wrap"><canvas id="ring-canvas"></canvas><div class="ring-center"><div class="rc-val" id="ring-val">0</div><div class="rc-lbl" id="ring-lbl">left</div></div></div>
    <div class="remain-macros" id="remain-macros"></div>
  </div>
  <div class="meal-bar-row" id="meal-bars"></div>
  <div id="micro-strip" style="margin:0 16px 12px"></div>
  <div id="log-body"></div>
</div>

<div id="view-add" class="page">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input class="search-input" id="search-input" type="text" placeholder="Search food..." oninput="handleSearch(this.value)" autocomplete="off"/>
    <button class="search-clear" id="search-clear" onclick="clearSearch()">&#10005;</button>
  </div>
  <div id="search-status" style="font-size:12px;color:var(--text2);margin-bottom:8px;min-height:16px"></div>
  <div id="search-results"></div>
  <div id="add-panel" style="display:none">
    <div class="add-form">
      <div class="add-form-title" id="af-name"></div>
      <div class="unit-tabs">
        <div class="unit-tab active" onclick="setUnitMode('grams')">Grams</div>
        <div class="unit-tab" onclick="setUnitMode('pieces')">Pieces</div>
        <div class="unit-tab" onclick="setUnitMode('spoons')">Spoons</div>
      </div>
      <div class="form-row">
        <div class="form-field"><label id="amount-label">Amount (g)</label><input type="number" id="af-amount" value="100" min="1" step="1" oninput="updatePreview()"></div>
        <div class="form-field" id="field-unit" style="display:none"><label>Unit</label>
          <select id="af-unit" onchange="updatePreview()">
            <option value="5">Teaspoon (5g)</option>
            <option value="15">Tablespoon (15g)</option>
            <option value="240">Cup (240ml)</option>
            <option value="30">Shot (30ml)</option>
          </select>
        </div>
        <div class="form-field"><label>Meal</label>
          <select id="af-meal"><option>Breakfast</option><option>Lunch</option><option selected>Dinner</option><option>Snack</option></select>
        </div>
      </div>
      <div class="preview-row" id="af-preview"></div>
      <button class="btn-primary" onclick="addToLog()">Add to log</button>
    </div>
  </div>
</div>

<div id="view-summary" class="page">
  <div class="range-toggle">
    <button class="range-btn active" id="btn-7" onclick="setRange(7)">Last 7 days</button>
    <button class="range-btn" id="btn-30" onclick="setRange(30)">Last 30 days</button>
  </div>
  <div class="weekly-grid" id="avg-grid"></div>
  <div class="chart-card"><div class="chart-title">Calories per day</div><div class="chart-wrap"><canvas id="chart-cal"></canvas></div></div>
  <div class="chart-card"><div class="chart-title">Macros breakdown</div><div class="chart-wrap"><canvas id="chart-macro"></canvas></div></div>
  <div class="chart-card">
    <div class="chart-title">Weight tracking</div>
    <div class="weight-log-row">
      <div class="form-field"><label>Date</label><input type="date" id="w-date"></div>
      <div class="form-field"><label>Weight (kg)</label><input type="number" id="w-val" placeholder="e.g. 105" step="0.1"></div>
      <button class="btn-primary" style="width:auto;padding:9px 14px;font-size:13px;flex-shrink:0;align-self:flex-end" onclick="addWeight()">Add</button>
    </div>
    <div class="chart-wrap" id="weight-chart-wrap" style="display:none"><canvas id="chart-weight"></canvas></div>
    <div id="weight-list"></div>
  </div>
</div>

<div id="view-custom" class="page">
  <div class="section-hd">Add custom food</div>
  <div style="background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px">
    <div class="form-row">
      <div class="form-field" style="flex:2"><label>Name</label><input type="text" id="cf-name" placeholder="e.g. Homemade goulash"></div>
      <div class="form-field"><label>Kcal / 100g</label><input type="number" id="cf-cal" placeholder="180"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Protein (g)</label><input type="number" id="cf-prot" placeholder="12"></div>
      <div class="form-field"><label>Carbs (g)</label><input type="number" id="cf-carb" placeholder="15"></div>
      <div class="form-field"><label>Fat (g)</label><input type="number" id="cf-fat" placeholder="8"></div>
      <div class="form-field"><label>Fiber (g)</label><input type="number" id="cf-fiber" placeholder="2"></div>
    </div>
    <div class="form-row">
      <div class="form-field"><label>Piece weight (g, optional)</label><input type="number" id="cf-piece" placeholder="e.g. 120"></div>
    </div>
    <button class="btn-primary" onclick="saveCustomFood()">Save food</button>
  </div>
  <div class="section-hd">My foods</div>
  <div id="custom-list"></div>
</div>

<div id="view-targets" class="page">
  <div class="section-hd">Daily targets</div>
  <div style="background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px">
    <div class="target-grid">
      <div class="form-field"><label>Calories (kcal)</label><input type="number" id="t-cal"></div>
      <div class="form-field"><label>Protein (g)</label><input type="number" id="t-prot"></div>
      <div class="form-field"><label>Carbs (g)</label><input type="number" id="t-carb"></div>
      <div class="form-field"><label>Fat (g)</label><input type="number" id="t-fat"></div>
      <div class="form-field"><label>Fiber (g)</label><input type="number" id="t-fiber"></div>
    </div>
    <button class="btn-primary" onclick="saveTargets()">Save</button>
    <div class="save-msg" id="save-msg">Saved</div>
  </div>
  <div class="section-hd">Sync between devices</div>
  <div style="background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:14px">
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6">Export copies all your data to clipboard. On the other device paste it into the Import box and tap Import.</p>
    <button class="btn-primary" onclick="exportData()" style="margin-bottom:10px">Export - copy to clipboard</button>
    <div id="export-msg" style="display:none;font-size:13px;color:var(--accent);margin-bottom:12px">Copied - paste on your other device.</div>
    <div style="height:.5px;background:var(--border);margin:12px 0"></div>
    <div class="form-field" style="margin-bottom:10px">
      <label>Paste export code here</label>
      <textarea id="import-input" rows="3" style="width:100%;padding:9px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;font-family:monospace;resize:vertical;outline:none;margin-top:5px" placeholder="Paste code from other device..."></textarea>
    </div>
    <button class="btn-primary" onclick="importData()">Import</button>
    <div id="import-msg" style="display:none;font-size:13px;margin-top:8px"></div>
  </div>
</div>

</div>

<div class="tab-bar">
  <button class="tab-item active" id="tab-log" onclick="switchView('log')"><span class="tab-icon">&#128203;</span><span>Log</span></button>
  <button class="tab-item" id="tab-add" onclick="switchView('add')"><span class="tab-icon">&#10133;</span><span>Add food</span></button>
  <button class="tab-item" id="tab-summary" onclick="switchView('summary')"><span class="tab-icon">&#128202;</span><span>Summary</span></button>
  <button class="tab-item" id="tab-custom" onclick="switchView('custom')"><span class="tab-icon">&#129367;</span><span>My foods</span></button>
  <button class="tab-item" id="tab-targets" onclick="switchView('targets')"><span class="tab-icon">&#9881;</span><span>Settings</span></button>
</div>

<script>
const DB=[

  {name:'White bread',cal:265,prot:9.0,carb:49.0,fat:3.2,fiber:2.7,piece:35},
  {name:'Whole wheat bread',cal:247,prot:13.0,carb:41.3,fat:3.4,fiber:6.0,piece:35},
  {name:'Rye bread',cal:259,prot:8.5,carb:48.3,fat:3.3,fiber:6.2,piece:32},

const SK={targets:'nl_targets',log:'nl_log',custom:'nl_custom',weight:'nl_weight'};
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch(e){return fb}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function todayISO(){return new Date().toISOString().slice(0,10)}
function fmt(n){return Math.round(n*10)/10}
function fmtI(n){return Math.round(n)}

const state={
  targets:lsGet(SK.targets,{cal:2200,prot:150,carb:200,fat:80,fiber:30}),
  log:lsGet(SK.log,{}),
  customFoods:lsGet(SK.custom,[]),
  weight:lsGet(SK.weight,{}),
  currentDate:todayISO(),
  pendingFood:null,
  unitMode:'grams',
  chartRange:7
};
function persist(k){lsSet(SK[k],state[k])}

let chartCal=null,chartMacro=null,chartWeight=null,ringChart=null;

const VIEWS=['log','add','summary','custom','targets'];
function switchView(v){
  VIEWS.forEach(id=>{
    document.getElementById('view-'+id).style.display=id===v?'block':'none';
    document.getElementById('tab-'+id).classList.toggle('active',id===v);
  });
  if(v==='log')renderLog();
  if(v==='summary')renderSummaryPage();
  if(v==='custom')renderCustomList();
  if(v==='targets')loadTargetsForm();
}

function changeDay(d){
  const dt=new Date(state.currentDate);dt.setDate(dt.getDate()+d);
  state.currentDate=dt.toISOString().slice(0,10);renderLog();
}
function dayLabel(iso){
  const today=todayISO();
  const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(iso===today)return'Today';if(iso===yest)return'Yesterday';
  return new Date(iso+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}
function getDateRange(n){
  const dates=[];
  for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().slice(0,10));}
  return dates;
}
function getTotals(date){
  return(state.log[date]||[]).reduce((a,e)=>({cal:a.cal+e.cal,prot:a.prot+e.prot,carb:a.carb+e.carb,fat:a.fat+e.fat,fiber:a.fiber+e.fiber}),{cal:0,prot:0,carb:0,fat:0,fiber:0});
}
function getMealTotals(date){
  const meals=['Breakfast','Lunch','Dinner','Snack'];const r={};
  meals.forEach(m=>{r[m]=(state.log[date]||[]).filter(e=>e.meal===m).reduce((a,e)=>a+e.cal,0);});
  return r;
}

function renderSummaryCards(totals){
  const t=state.targets;
  const ms=[{lbl:'Calories',val:fmtI(totals.cal),tgt:t.cal,unit:'kcal',color:'#e4880a'},{lbl:'Protein',val:fmt(totals.prot),tgt:t.prot,unit:'g',color:'#1a5fa8'},{lbl:'Carbs',val:fmt(totals.carb),tgt:t.carb,unit:'g',color:'#1d9e75'},{lbl:'Fat',val:fmt(totals.fat),tgt:t.fat,unit:'g',color:'#c0392b'}];
  document.getElementById('summary').innerHTML=ms.map(m=>{
    const pct=m.tgt?Math.min(100,m.val/m.tgt*100):0;const over=m.tgt&&m.val>m.tgt;
    return`<div class="macro-card"><div class="lbl">${m.lbl}</div><div class="val ${over?'val-over':''}">${m.val}</div><div class="tgt">${m.tgt?'/ '+m.tgt+' '+m.unit:'-'}</div>${m.tgt?`<div class="bar"><div class="bar-fill" style="width:${pct}%;background:${over?'var(--danger)':m.color}"></div></div>`:''}</div>`;
  }).join('');
}

function renderRing(totals){
  const t=state.targets;const over=totals.cal>t.cal;
  const rem=Math.max(0,t.cal-totals.cal);
  const pct=t.cal?Math.min(100,totals.cal/t.cal*100):0;
  document.getElementById('ring-val').textContent=fmtI(over?totals.cal-t.cal:rem);
  document.getElementById('ring-lbl').textContent=over?'over':'left';
  document.getElementById('ring-val').style.color=over?'var(--danger)':'var(--accent)';
  const color=over?'#e57373':'#52b788';
  try{
    const ctx=document.getElementById('ring-canvas').getContext('2d');
    if(ringChart)ringChart.destroy();
    ringChart=new Chart(ctx,{type:'doughnut',data:{datasets:[{data:[pct,100-pct],backgroundColor:[color,'rgba(128,128,128,0.15)'],borderWidth:0,borderRadius:4}]},options:{cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{duration:400}}});
  }catch(e){}
  const macros=[{lbl:'Protein',val:fmt(totals.prot),tgt:t.prot,over:totals.prot>t.prot},{lbl:'Carbs',val:fmt(totals.carb),tgt:t.carb,over:totals.carb>t.carb},{lbl:'Fat',val:fmt(totals.fat),tgt:t.fat,over:totals.fat>t.fat},{lbl:'Fiber',val:fmt(totals.fiber),tgt:t.fiber,over:totals.fiber>t.fiber}];
  document.getElementById('remain-macros').innerHTML=macros.map(m=>`<div class="rm-item"><div class="rm-lbl">${m.lbl}</div><div class="rm-val ${m.over?'over':''}">${m.val}${m.tgt?' / '+m.tgt:''}g</div></div>`).join('');
}

function renderMealBars(date){
  const mt=getMealTotals(date);const t=state.targets.cal||2200;
  const meals=['Breakfast','Lunch','Dinner','Snack'];const colors=['#e4880a','#1d9e75','#1a5fa8','#9b59b6'];
  document.getElementById('meal-bars').innerHTML=meals.map((m,i)=>{
    const cal=mt[m]||0;if(!cal)return'';
    const pct=Math.min(100,cal/t*100);
    return`<div class="meal-bar-item"><div class="meal-bar-label">${m}</div><div class="meal-bar-track"><div class="meal-bar-fill" style="width:${pct}%;background:${colors[i]}"></div></div><div class="meal-bar-cal">${fmtI(cal)}</div></div>`;
  }).join('');
}

function renderMicroStrip(totals){
  const t=state.targets;
  const items=[{lbl:'Fiber',val:fmt(totals.fiber),tgt:t.fiber,color:'#1d9e75'},{lbl:'Protein',val:fmt(totals.prot),tgt:t.prot,color:'#1a5fa8'}];
  document.getElementById('micro-strip').innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
  items.map(m=>{const pct=m.tgt?Math.min(100,parseFloat(m.val)/m.tgt*100):0;const over=m.tgt&&parseFloat(m.val)>m.tgt;
    return`<div class="micro-item"><div class="mi-lbl">${m.lbl}</div><div class="mi-val" style="color:${over?'var(--danger)':m.color}">${m.val}g</div><div class="mi-tgt">${m.tgt?'Target: '+m.tgt+'g':'No target'}</div>${m.tgt?`<div class="bar"><div class="bar-fill" style="width:${pct}%;background:${over?'var(--danger)':m.color}"></div></div>`:''}</div>`;
  }).join('')+'</div>';
}

function renderLog(){
  document.getElementById('date-label').textContent=dayLabel(state.currentDate);
  const totals=getTotals(state.currentDate);
  renderSummaryCards(totals);renderRing(totals);renderMealBars(state.currentDate);renderMicroStrip(totals);
  const entries=state.log[state.currentDate]||[];
  const meals=['Breakfast','Lunch','Dinner','Snack'];let html='';
  meals.forEach(meal=>{
    const items=entries.filter(e=>e.meal===meal);if(!items.length)return;
    html+=`<div class="log-section"><div class="meal-header">${meal}</div>`;
    items.forEach(e=>{
      const idx=entries.indexOf(e);
      html+=`<div class="food-item"><div class="food-item-info"><div class="food-item-name">${e.name}</div><div class="food-item-meta">${e.amountLabel} - P ${fmt(e.prot)}g - C ${fmt(e.carb)}g - F ${fmt(e.fat)}g</div></div><div class="food-item-cal">${fmtI(e.cal)} kcal</div><button class="del-btn" onclick="removeEntry('${state.currentDate}',${idx})">x</button></div>`;
    });
    html+='</div>';
  });
  const body=document.getElementById('log-body');
  if(!entries.length){body.innerHTML=`<div class="empty-log">Nothing logged ${dayLabel(state.currentDate).toLowerCase()==='today'?'today':'for '+dayLabel(state.currentDate).toLowerCase()}.<br>Tap Add food to start.</div>`;}
  else{html+=`<div class="day-total"><span>Fiber: ${fmt(totals.fiber)}g</span><span>Total: ${fmtI(totals.cal)} kcal - P ${fmt(totals.prot)}g - C ${fmt(totals.carb)}g - F ${fmt(totals.fat)}g</span></div>`;body.innerHTML=html;}
}

function removeEntry(date,idx){state.log[date].splice(idx,1);persist('log');renderLog();}

function setRange(n){
  state.chartRange=n;
  document.getElementById('btn-7').classList.toggle('active',n===7);
  document.getElementById('btn-30').classList.toggle('active',n===30);
  renderSummaryPage();
}

function renderSummaryPage(){
  const dates=getDateRange(state.chartRange);
  const calData=dates.map(d=>fmtI(getTotals(d).cal));
  const protData=dates.map(d=>fmt(getTotals(d).prot));
  const carbData=dates.map(d=>fmt(getTotals(d).carb));
  const fatData=dates.map(d=>fmt(getTotals(d).fat));
  const labels=dates.map(d=>new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}));
  const daysLogged=dates.filter(d=>(state.log[d]||[]).length>0).length;
  const avgCal=daysLogged?Math.round(dates.reduce((a,d)=>a+getTotals(d).cal,0)/daysLogged):0;
  const avgProt=daysLogged?fmt(dates.reduce((a,d)=>a+getTotals(d).prot,0)/daysLogged):0;
  const avgCarb=daysLogged?fmt(dates.reduce((a,d)=>a+getTotals(d).carb,0)/daysLogged):0;
  document.getElementById('avg-grid').innerHTML=`
    <div class="week-stat"><div class="ws-lbl">Avg calories</div><div class="ws-val">${avgCal}</div><div class="ws-sub">kcal / logged day</div></div>
    <div class="week-stat"><div class="ws-lbl">Avg protein</div><div class="ws-val">${avgProt}g</div><div class="ws-sub">target: ${state.targets.prot}g</div></div>
    <div class="week-stat"><div class="ws-lbl">Avg carbs</div><div class="ws-val">${avgCarb}g</div><div class="ws-sub">target: ${state.targets.carb}g</div></div>
    <div class="week-stat"><div class="ws-lbl">Days logged</div><div class="ws-val">${daysLogged}</div><div class="ws-sub">of last ${state.chartRange}</div></div>`;
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';
  const tc=isDark?'#606058':'#9e9e97';
  const bo={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:10},maxRotation:45}},y:{grid:{color:gc},ticks:{color:tc,font:{size:10}}}}};
  if(typeof Chart==='undefined'||!Chart){document.getElementById('chart-cal').parentElement.innerHTML='<p style="color:var(--text3);font-size:13px;padding:20px 0;text-align:center">Charts unavailable offline</p>';return;}
  if(chartCal)chartCal.destroy();
  chartCal=new Chart(document.getElementById('chart-cal').getContext('2d'),{type:'bar',data:{labels,datasets:[{data:calData,backgroundColor:calData.map(v=>v>state.targets.cal?'rgba(192,57,43,0.7)':'rgba(45,106,79,0.7)'),borderRadius:4}]},options:{...bo,plugins:{...bo.plugins,tooltip:{callbacks:{label:ctx=>`${ctx.raw} kcal`}}},scales:{...bo.scales,y:{...bo.scales.y,suggestedMax:state.targets.cal*1.2}}}});
  if(chartMacro)chartMacro.destroy();
  chartMacro=new Chart(document.getElementById('chart-macro').getContext('2d'),{type:'bar',data:{labels,datasets:[{label:'Protein',data:protData,backgroundColor:'rgba(26,95,168,0.8)',stack:'s'},{label:'Carbs',data:carbData,backgroundColor:'rgba(29,158,117,0.8)',stack:'s'},{label:'Fat',data:fatData,backgroundColor:'rgba(192,57,43,0.8)',stack:'s'}]},options:{...bo,plugins:{legend:{display:true,position:'bottom',labels:{color:tc,font:{size:11},boxWidth:12}},tooltip:{mode:'index',intersect:false}},scales:{x:{...bo.scales.x,stacked:true},y:{...bo.scales.y,stacked:true}}}});
  renderWeightChart(labels,dates);renderWeightList();
}

function renderWeightChart(labels,dates){
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=isDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';
  const tc=isDark?'#606058':'#9e9e97';
  const wData=dates.map(d=>state.weight[d]||null);
  const hasData=wData.some(v=>v!==null);
  document.getElementById('weight-chart-wrap').style.display=hasData?'block':'none';
  if(hasData){
    if(chartWeight)chartWeight.destroy();
    chartWeight=new Chart(document.getElementById('chart-weight').getContext('2d'),{type:'line',data:{labels,datasets:[{data:wData,borderColor:'rgba(45,106,79,0.9)',backgroundColor:'rgba(45,106,79,0.1)',borderWidth:2,pointRadius:4,pointBackgroundColor:'rgba(45,106,79,0.9)',tension:0.3,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw} kg`}}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:10},maxRotation:45}},y:{grid:{color:gc},ticks:{color:tc,font:{size:10}}}}}});
  }
}

function addWeight(){
  const d=document.getElementById('w-date').value;const v=parseFloat(document.getElementById('w-val').value);
  if(!d||isNaN(v))return;
  state.weight[d]=v;persist('weight');
  document.getElementById('w-val').value='';
  renderWeightList();renderSummaryPage();
}
function renderWeightList(){
  const entries=Object.entries(state.weight).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,5);
  const list=document.getElementById('weight-list');
  if(!entries.length){list.innerHTML='<div style="font-size:13px;color:var(--text3);padding:8px 0">No weight entries yet.</div>';return;}
  list.innerHTML=entries.map(([d,v])=>`<div class="weight-entry"><span class="weight-entry-date">${dayLabel(d)}</span><div style="display:flex;align-items:center;gap:10px"><span class="weight-entry-val">${v} kg</span><button class="btn-sm-danger" onclick="deleteWeight('${d}')">x</button></div></div>`).join('');
}
function deleteWeight(d){delete state.weight[d];persist('weight');renderWeightList();renderSummaryPage();}

function handleSearch(q){
  document.getElementById('search-clear').style.display=q?'flex':'none';
  const ql=q.trim().toLowerCase();
  document.getElementById('add-panel').style.display='none';state.pendingFood=null;
  if(!ql){document.getElementById('search-results').innerHTML='';document.getElementById('search-status').textContent='';return;}
  const all=[...state.customFoods.filter(f=>f.name.toLowerCase().includes(ql)).map(f=>({...f,_src:'custom'})),...DB.filter(f=>f.name.toLowerCase().includes(ql)).map(f=>({...f,_src:'builtin'}))];
  if(!all.length){document.getElementById('search-results').innerHTML=`<div class="no-results">No results for "${q}". Add it under My foods.</div>`;document.getElementById('search-status').textContent='';return;}
  document.getElementById('search-status').textContent=`${all.length} result${all.length!==1?'s':''}`;
  document.getElementById('search-results').innerHTML=`<div class="results-list">${all.map(f=>`<div class="result-item" onclick='pickFood(${JSON.stringify(f).replace(/'/g,"&#39;")})'><div style="flex:1;min-width:0"><div class="result-name">${f.name}<span class="tag ${f._src==='custom'?'tag-custom':'tag-builtin'}">${f._src}</span></div><div class="result-meta">per 100g - P ${fmt(f.prot)}g - C ${fmt(f.carb)}g - F ${fmt(f.fat)}g${f.piece?' - 1pc='+f.piece+'g':''}</div></div><div class="result-cal">${fmtI(f.cal)}</div></div>`).join('')}</div>`;
}
function clearSearch(){document.getElementById('search-input').value='';handleSearch('');}

function setUnitMode(mode){
  state.unitMode=mode;
  document.querySelectorAll('.unit-tab').forEach((t,i)=>t.classList.toggle('active',['grams','pieces','spoons'][i]===mode));
  const f=state.pendingFood;const ai=document.getElementById('af-amount');
  if(mode==='grams'){document.getElementById('amount-label').textContent='Amount (g)';document.getElementById('field-unit').style.display='none';ai.value=100;ai.step=1;}
  else if(mode==='pieces'){document.getElementById('amount-label').textContent='Pieces'+(f&&f.piece?' (1pc='+f.piece+'g)':'');document.getElementById('field-unit').style.display='none';ai.value=1;ai.step=0.5;}
  else{document.getElementById('amount-label').textContent='Count';document.getElementById('field-unit').style.display='';ai.value=1;ai.step=0.5;}
  updatePreview();
}
function getEffectiveGrams(){
  const f=state.pendingFood;const count=parseFloat(document.getElementById('af-amount').value)||0;
  if(state.unitMode==='grams')return count;
  if(state.unitMode==='pieces')return count*(f&&f.piece?f.piece:100);
  return count*(parseFloat(document.getElementById('af-unit').value)||15);
}
function getAmountLabel(){
  const count=parseFloat(document.getElementById('af-amount').value)||0;
  if(state.unitMode==='grams')return count+'g';
  if(state.unitMode==='pieces')return count+' pc';
  const sel=document.getElementById('af-unit');return count+' '+sel.options[sel.selectedIndex].text.split(' ')[0].toLowerCase();
}
function pickFood(food){
  state.pendingFood=food;
  document.getElementById('add-panel').style.display='block';
  document.getElementById('af-name').textContent=food.name;
  const hp=food.piece&&food.piece>0;
  document.querySelectorAll('.unit-tab')[1].style.opacity=hp?'':'.35';
  document.querySelectorAll('.unit-tab')[1].style.pointerEvents=hp?'':'none';
  setUnitMode('grams');
  document.getElementById('add-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function updatePreview(){
  if(!state.pendingFood)return;
  const f=state.pendingFood;const r=getEffectiveGrams()/100;
  document.getElementById('af-preview').innerHTML=`<div class="preview-item"><div class="pv">${fmtI(f.cal*r)}</div><div class="pl">kcal</div></div><div class="preview-item"><div class="pv">${fmt(f.prot*r)}g</div><div class="pl">protein</div></div><div class="preview-item"><div class="pv">${fmt(f.carb*r)}g</div><div class="pl">carbs</div></div>`;
}
function addToLog(){
  const f=state.pendingFood;if(!f)return;
  const g=getEffectiveGrams();const r=g/100;const meal=document.getElementById('af-meal').value;
  if(!state.log[state.currentDate])state.log[state.currentDate]=[];
  state.log[state.currentDate].push({name:f.name,meal,amountLabel:getAmountLabel(),cal:f.cal*r,prot:f.prot*r,carb:f.carb*r,fat:f.fat*r,fiber:(f.fiber||0)*r});
  persist('log');state.pendingFood=null;clearSearch();
  document.getElementById('add-panel').style.display='none';switchView('log');
}

function saveCustomFood(){
  const name=document.getElementById('cf-name').value.trim();if(!name)return;
  state.customFoods.push({name,cal:parseFloat(document.getElementById('cf-cal').value)||0,prot:parseFloat(document.getElementById('cf-prot').value)||0,carb:parseFloat(document.getElementById('cf-carb').value)||0,fat:parseFloat(document.getElementById('cf-fat').value)||0,fiber:parseFloat(document.getElementById('cf-fiber').value)||0,piece:parseFloat(document.getElementById('cf-piece').value)||null});
  persist('custom');['cf-name','cf-cal','cf-prot','cf-carb','cf-fat','cf-fiber','cf-piece'].forEach(id=>document.getElementById(id).value='');renderCustomList();
}
function renderCustomList(){
  const list=document.getElementById('custom-list');
  if(!state.customFoods.length){list.innerHTML='<div class="empty-log">No custom foods yet.</div>';return;}
  list.innerHTML=state.customFoods.map((f,i)=>`<div class="custom-item"><div class="custom-item-info"><div class="custom-item-name">${f.name}</div><div class="custom-item-meta">${fmtI(f.cal)} kcal - P ${fmt(f.prot)}g - C ${fmt(f.carb)}g - F ${fmt(f.fat)}g${f.piece?' - 1pc='+f.piece+'g':''}</div></div><button class="btn-sm-danger" onclick="deleteCustom(${i})">Delete</button></div>`).join('');
}
function deleteCustom(i){state.customFoods.splice(i,1);persist('custom');renderCustomList();}

function loadTargetsForm(){['cal','prot','carb','fat','fiber'].forEach(k=>document.getElementById('t-'+k).value=state.targets[k]);}
function saveTargets(){
  ['cal','prot','carb','fat','fiber'].forEach(k=>state.targets[k]=parseFloat(document.getElementById('t-'+k).value)||0);
  persist('targets');const m=document.getElementById('save-msg');m.style.display='block';setTimeout(()=>m.style.display='none',2000);
}

function exportData(){
  const payload=JSON.stringify({v:2,targets:state.targets,log:state.log,customFoods:state.customFoods,weight:state.weight});
  const encoded=btoa(unescape(encodeURIComponent(payload)));
  navigator.clipboard.writeText(encoded).then(()=>{const m=document.getElementById('export-msg');m.style.display='block';setTimeout(()=>m.style.display='none',4000);}).catch(()=>prompt('Copy this code:',encoded));
}
function importData(){
  const raw=document.getElementById('import-input').value.trim();
  const msg=document.getElementById('import-msg');
  if(!raw){msg.style.display='block';msg.style.color='var(--danger)';msg.textContent='Please paste an export code first.';return;}
  try{
    const p=JSON.parse(decodeURIComponent(escape(atob(raw))));
    if(!p.targets)throw new Error();
    state.targets=p.targets;state.log=p.log||{};state.customFoods=p.customFoods||[];state.weight=p.weight||{};
    persist('targets');persist('log');persist('custom');persist('weight');
    document.getElementById('import-input').value='';
    msg.style.display='block';msg.style.color='var(--accent)';msg.textContent='Imported - all data updated.';
    setTimeout(()=>msg.style.display='none',4000);loadTargetsForm();
  }catch(e){msg.style.display='block';msg.style.color='var(--danger)';msg.textContent='Invalid code - make sure you copied the full export.';}
}

function initApp(){
  try{
    VIEWS.forEach(id=>document.getElementById('view-'+id).style.display='none');
    document.getElementById('w-date').value=todayISO();
    loadTargetsForm();
    switchView('log');
  }catch(e){
    document.body.innerHTML='<div style="padding:32px;font-family:system-ui;color:#c0392b"><b>Error loading app:</b><br>'+e.message+'</div>';
  }
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initApp);}else{initApp();}
<\/script>
</body>
</html>
